name: Check Requirements Sync

on:
  pull_request:
    paths:
      - 'requirements.in'
      - 'requirements.txt'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Get changed files
        id: changed-files
        run: |
          # Get the list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check which requirements files changed
          if echo "$CHANGED_FILES" | grep -q "^requirements\.in$"; then
            echo "requirements_in_changed=true" >> $GITHUB_OUTPUT
          else
            echo "requirements_in_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q "^requirements\.txt$"; then
            echo "requirements_txt_changed=true" >> $GITHUB_OUTPUT
          else
            echo "requirements_txt_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for unauthorized requirements.txt edit
        if: steps.changed-files.outputs.requirements_txt_changed == 'true' && steps.changed-files.outputs.requirements_in_changed == 'false'
        run: |
          echo "::error::requirements.txt was modified without updating requirements.in"
          echo ""
          echo "Direct edits to requirements.txt are not allowed."
          echo "To update dependencies:"
          echo "  1. Edit requirements.in with the desired version changes"
          echo "  2. Run: pip-compile --generate-hashes requirements.in"
          echo "  3. Commit both files together"
          exit 1

      - name: Check requirements.txt is properly generated
        if: steps.changed-files.outputs.requirements_in_changed == 'true'
        run: |
          pip-compile --generate-hashes requirements.in -o requirements.txt.new
          if ! diff -q requirements.txt requirements.txt.new > /dev/null 2>&1; then
            echo "::error::requirements.txt is out of sync with requirements.in"
            echo ""
            echo "Run the following command locally and commit the result:"
            echo "  pip-compile --generate-hashes requirements.in"
            echo ""
            echo "Differences found:"
            diff requirements.txt requirements.txt.new || true
            exit 1
          fi
          echo "requirements.txt is properly generated from requirements.in"

      - name: Check hash integrity
        if: steps.changed-files.outputs.requirements_txt_changed == 'true'
        run: |
          # Get requirements.txt from base branch
          git show origin/${{ github.base_ref }}:requirements.txt > requirements.txt.base 2>/dev/null || {
            echo "No requirements.txt in base branch, skipping hash integrity check"
            exit 0
          }

          # Create a Python script to check hash integrity
          cat << 'EOF' > check_hashes.py
          import re
          import sys

          def parse_requirements(content):
              """Parse requirements.txt and extract package versions and hashes."""
              packages = {}
              current_pkg = None
              current_version = None
              current_hashes = set()

              for line in content.split('\n'):
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue

                  # Match package==version pattern
                  pkg_match = re.match(r'^([a-zA-Z0-9_-]+)==([^\s\\]+)', line)
                  if pkg_match:
                      # Save previous package
                      if current_pkg:
                          packages[current_pkg] = {
                              'version': current_version,
                              'hashes': current_hashes
                          }
                      current_pkg = pkg_match.group(1).lower()
                      current_version = pkg_match.group(2)
                      current_hashes = set()

                  # Match hash pattern
                  hash_match = re.search(r'--hash=sha256:([a-f0-9]+)', line)
                  if hash_match and current_pkg:
                      current_hashes.add(hash_match.group(1))

              # Save last package
              if current_pkg:
                  packages[current_pkg] = {
                      'version': current_version,
                      'hashes': current_hashes
                  }

              return packages

          def check_hash_integrity(base_content, pr_content):
              """Check for suspicious hash changes."""
              base_pkgs = parse_requirements(base_content)
              pr_pkgs = parse_requirements(pr_content)

              errors = []
              warnings = []

              for pkg, pr_data in pr_pkgs.items():
                  if pkg not in base_pkgs:
                      continue  # New package, nothing to compare

                  base_data = base_pkgs[pkg]

                  # Only check if version is the same
                  if pr_data['version'] != base_data['version']:
                      continue  # Version changed, hash changes are expected

                  base_hashes = base_data['hashes']
                  pr_hashes = pr_data['hashes']

                  # Check for removed hashes (suspicious)
                  removed = base_hashes - pr_hashes
                  if removed:
                      errors.append(
                          f"CRITICAL: {pkg}=={pr_data['version']}: "
                          f"{len(removed)} hash(es) REMOVED. "
                          f"This could indicate a supply chain attack."
                      )

                  # Check for added hashes (requires review)
                  added = pr_hashes - base_hashes
                  if added:
                      warnings.append(
                          f"WARNING: {pkg}=={pr_data['version']}: "
                          f"{len(added)} new hash(es) added. "
                          f"Verify these are legitimate (e.g., new platform wheels)."
                      )

              return errors, warnings

          if __name__ == '__main__':
              with open('requirements.txt.base', 'r') as f:
                  base_content = f.read()
              with open('requirements.txt', 'r') as f:
                  pr_content = f.read()

              errors, warnings = check_hash_integrity(base_content, pr_content)

              if warnings:
                  print("=" * 60)
                  print("HASH INTEGRITY WARNINGS")
                  print("=" * 60)
                  for w in warnings:
                      print(f"  {w}")
                  print()

              if errors:
                  print("=" * 60)
                  print("HASH INTEGRITY ERRORS")
                  print("=" * 60)
                  for e in errors:
                      print(f"  {e}")
                  print()
                  print("Hash removal or modification for unchanged package versions")
                  print("is not allowed as it may indicate a supply chain attack.")
                  print()
                  print("If this is a legitimate change, please explain in the PR")
                  print("description and request review from the security team.")
                  sys.exit(1)

              if not errors and not warnings:
                  print("Hash integrity check passed.")
          EOF

          python check_hashes.py
