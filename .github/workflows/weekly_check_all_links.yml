# cspell: words linkcheck

name: Weekly Full Link Check

# Runs weekly to verify all links in the documentation, including those that
# are reachable from the CI environment.  Creates a GitHub issue if any links
# return HTTP 4xx responses.  Complements the ignored-links workflow, which
# separately checks URLs excluded from the standard linkcheck.
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  SPHINXOPTS: --quiet

jobs:
  check-all-links:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Prepare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Requirements
        run: pip install -r requirements.txt

      - name: Run linkcheck
        continue-on-error: true
        run: make linkcheck

      - name: Gather known broken URLs from open issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo ${{ github.repository }} \
            --label "bug" \
            --state open \
            --search "Broken link in:title" \
            --json number,body > open_issues.json
          python .github/scripts/extract_known_urls.py open_issues.json > known_urls.json
          echo "Known URLs from open issues:"
          cat known_urls.json

      - name: Report broken links
        id: report
        run: |
          set +e
          # stderr is intentionally merged into issue_body.md (2>&1) so that any
          # Python warnings or script errors appear in the issue for diagnostics.
          # If stderr output ever corrupts the issue body formatting, replace 2>&1
          # with a separate redirect (e.g., 2>report_err.txt) and handle it separately.
          #
          # Exit codes:
          #   0 - no broken links found
          #   1 - new broken links found (create issue)
          #   2 - output.json missing or unreadable
          #   3 - broken links found but all are already tracked (skip issue creation)
          python .github/scripts/report_linkcheck.py --known-urls-file known_urls.json > issue_body.md 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat issue_body.md

      - name: Create issue for broken links
        if: steps.report.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Broken link(s) detected" \
            --label "bug" \
            --body-file issue_body.md

      - name: Upload linkcheck Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkcheck-output
          path: 'build/linkcheck/output.*'
